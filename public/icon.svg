<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Liquid Glass 배경 그라디언트 -->
    <linearGradient id="glassBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8eeff"/>
    </linearGradient>

    <!-- 코닉 그라디언트를 흉내내는 방사형 -->
    <radialGradient id="orbGlow" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0088ff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#6155f5" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#cb30e0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0088ff" stop-opacity="0.05"/>
    </radialGradient>

    <!-- 상단 하이라이트 -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- 외곽 글로우 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 내부 그림자 -->
    <filter id="innerShadow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>

    <!-- Orb 코닉 그라디언트 (4색 sweepGradient 근사) -->
    <linearGradient id="conic1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0088ff"/>
      <stop offset="33%" stop-color="#6155f5"/>
      <stop offset="66%" stop-color="#cb30e0"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
  </defs>

  <!-- 외곽 글로우 -->
  <rect x="56" y="56" width="400" height="400" rx="88" ry="88" fill="#0088ff" opacity="0.08" filter="url(#glow)"/>

  <!-- Liquid Glass 프레임 -->
  <rect x="76" y="76" width="360" height="360" rx="80" ry="80" fill="white" opacity="0.85"/>
  <rect x="76" y="76" width="360" height="360" rx="80" ry="80" fill="url(#glassBg)" opacity="0.5"/>

  <!-- 프레임 보더 -->
  <rect x="76" y="76" width="360" height="360" rx="80" ry="80"
    fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- 내부 원형 Orb 배경 -->
  <circle cx="256" cy="256" r="120" fill="#0088ff" opacity="0.08"/>

  <!-- Orb 코닉 그라디언트 링 -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="url(#conic1)" stroke-width="24" opacity="0.15"/>

  <!-- Orb 프로스트 (흰 원) -->
  <circle cx="256" cy="256" r="110" fill="white" opacity="0.88"/>

  <!-- Orb 빛 굴절 -->
  <circle cx="256" cy="256" r="105" fill="url(#orbGlow)"/>

  <!-- Orb 하이라이트 (상단 빛) -->
  <ellipse cx="256" cy="210" rx="70" ry="45" fill="url(#highlight)" opacity="0.5"/>

  <!-- 상단 유리 반사 -->
  <rect x="106" y="86" width="300" height="80" rx="60" ry="40" fill="url(#highlight)" opacity="0.25"/>

  <!-- N 글자 (중앙에 미세하게) -->
  <text x="256" y="275" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif"
    font-size="72" font-weight="700" fill="#0088ff" opacity="0.25">N</text>
</svg>
